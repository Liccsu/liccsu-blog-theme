<!doctype html>
<html xmlns:th="https://www.thymeleaf.org">
  <!-- ========================================== -->
  <!--   装备分组切换组件 - 多种 Tab 样式          -->
  <!--   仅在 Tech 风格模式下使用                  -->
  <!-- ========================================== -->

  <!-- 
  风格说明:
  1. pills - 药丸风格：简约标签，胶囊形状
  2. chips - 芯片风格：圆角边框，带计数
  3. underline - 下划线风格：极简，文字+下划线
  4. glass - 玻璃拟态：毛玻璃背景

  注：为"全部"按钮预设激活样式，避免 Alpine.js 初始化前闪烁
-->

  <!-- ===================== -->
  <!-- 药丸风格 - 胶囊徽章 -->
  <!-- ===================== -->
  <div th:fragment="pills(groups, activeTab)" class="equipment-tabs-pills mb-6">
    <div class="flex flex-wrap items-center gap-2">
      <!-- 全部按钮 - 预设激活样式 -->
      <button
        @click="activeTab = 'all'"
        class="bg-base-100 text-base-content border-base-content/10 inline-flex cursor-pointer items-center gap-1.5 rounded-full border px-3.5 py-1.5 text-sm font-medium shadow-sm transition-all duration-200"
        :class="activeTab === 'all' 
                ? 'bg-base-100 text-base-content shadow-sm border-base-content/10' 
                : '!bg-base-100/60 !text-base-content/60 !border-base-content/5 hover:!bg-base-100 hover:!text-base-content hover:shadow-sm hover:!border-base-content/10 !shadow-none'"
      >
        <span class="icon-[heroicons--squares-2x2] h-3.5 w-3.5"></span>
        <span>全部</span>
      </button>

      <!-- 分组按钮 -->
      <th:block th:each="group : ${groups}">
        <button
          th:attr="data-group-id=${group.metadata.name}"
          @click="activeTab = $el.dataset.groupId"
          class="bg-base-100/60 text-base-content/60 border-base-content/5 inline-flex cursor-pointer items-center gap-1.5 rounded-full border px-3.5 py-1.5 text-sm font-medium transition-all duration-200"
          :class="activeTab === $el.dataset.groupId 
                    ? '!bg-base-100 !text-base-content shadow-sm !border-base-content/10' 
                    : ''"
        >
          <span
            th:if="${#annotations.get(group, 'icon') != null}"
            class="group-icon h-3.5 w-3.5"
            th:utext="${#annotations.get(group, 'icon')}"
          ></span>
          <span
            th:unless="${#annotations.get(group, 'icon') != null}"
            class="icon-[heroicons--folder] h-3.5 w-3.5 opacity-50"
          ></span>
          <span th:text="${group.spec.displayName}"></span>
          <span class="text-xs opacity-50" th:text="${group.status.equipmentCount}"></span>
        </button>
      </th:block>
    </div>
  </div>

  <!-- ===================== -->
  <!-- 芯片风格 - 边框卡片   -->
  <!-- ===================== -->
  <div th:fragment="chips(groups, activeTab)" class="equipment-tabs-chips mb-6">
    <div class="flex flex-wrap justify-center gap-2">
      <!-- 全部芯片 - 预设激活样式 -->
      <button
        @click="activeTab = 'all'"
        class="bg-primary/10 text-primary border-primary/30 inline-flex h-9 cursor-pointer items-center gap-2 rounded-lg border px-4 text-sm font-medium transition-all duration-200"
        :class="activeTab === 'all' 
                ? 'bg-primary/10 text-primary border-primary/30' 
                : '!bg-base-100 !text-base-content/60 !border-base-content/10 hover:!border-primary/30 hover:!text-primary'"
      >
        <span class="icon-[heroicons--squares-2x2] h-4 w-4"></span>
        <span>全部</span>
      </button>

      <!-- 分组芯片 -->
      <th:block th:each="group : ${groups}">
        <button
          th:attr="data-group-id=${group.metadata.name}"
          @click="activeTab = $el.dataset.groupId"
          class="bg-base-100 text-base-content/60 border-base-content/10 inline-flex h-9 cursor-pointer items-center gap-1.5 rounded-lg border px-4 text-sm font-medium transition-all duration-200"
          :class="activeTab === $el.dataset.groupId 
                    ? '!bg-primary/10 !text-primary !border-primary/30' 
                    : ''"
        >
          <span
            th:if="${#annotations.get(group, 'icon') != null}"
            class="group-icon h-4 w-4"
            th:utext="${#annotations.get(group, 'icon')}"
          ></span>
          <span
            th:unless="${#annotations.get(group, 'icon') != null}"
            class="icon-[heroicons--folder] h-4 w-4 opacity-50"
          ></span>
          <span th:text="${group.spec.displayName}"></span>
          <span class="text-xs opacity-50" th:text="'(' + ${group.status.equipmentCount} + ')'"></span>
        </button>
      </th:block>
    </div>
  </div>

  <!-- ===================== -->
  <!-- 下划线风格 - 极简     -->
  <!-- ===================== -->
  <div th:fragment="underline(groups, activeTab)" class="equipment-tabs-underline mb-6">
    <div class="border-base-content/10 flex flex-wrap items-center justify-center gap-x-1 gap-y-0 border-b pb-px">
      <!-- 全部 - 预设激活样式 -->
      <button
        @click="activeTab = 'all'"
        class="text-primary relative cursor-pointer px-3 py-2.5 text-sm font-medium transition-colors duration-200"
        :class="activeTab === 'all' ? 'text-primary' : '!text-base-content/50 hover:!text-base-content'"
      >
        <span>全部</span>
        <span
          class="bg-primary absolute right-1 bottom-0 left-1 h-0.5 rounded-full"
          :class="activeTab === 'all' ? '' : 'hidden'"
        ></span>
      </button>

      <!-- 分组 -->
      <th:block th:each="group : ${groups}">
        <button
          th:attr="data-group-id=${group.metadata.name}"
          @click="activeTab = $el.dataset.groupId"
          class="text-base-content/50 relative cursor-pointer px-3 py-2.5 text-sm font-medium transition-colors duration-200"
          :class="activeTab === $el.dataset.groupId ? '!text-primary' : ''"
        >
          <span th:text="${group.spec.displayName}"></span>
          <sup class="ml-0.5 text-xs opacity-40" th:text="${group.status.equipmentCount}"></sup>
          <span
            class="bg-primary absolute right-1 bottom-0 left-1 hidden h-0.5 rounded-full"
            :class="activeTab === $el.dataset.groupId ? '!block' : ''"
          ></span>
        </button>
      </th:block>
    </div>
  </div>

  <!-- ===================== -->
  <!-- 玻璃拟态风格 - 轻量   -->
  <!-- ===================== -->
  <div th:fragment="glass(groups, activeTab)" class="equipment-tabs-glass mb-6">
    <div
      class="bg-base-200/40 dark:bg-base-300/30 flex flex-wrap justify-center gap-2 rounded-2xl p-3 backdrop-blur-sm"
    >
      <!-- 全部 - 预设激活样式 -->
      <button
        @click="activeTab = 'all'"
        class="bg-base-100 text-base-content dark:bg-base-100/90 cursor-pointer rounded-xl px-4 py-2 text-sm font-medium shadow-sm transition-all duration-200"
        :class="activeTab === 'all' 
                ? 'bg-base-100 text-base-content shadow-sm dark:bg-base-100/90' 
                : '!bg-transparent !text-base-content/50 hover:!text-base-content hover:!bg-base-100/60 !shadow-none'"
      >
        全部
      </button>

      <!-- 分组 -->
      <th:block th:each="group : ${groups}">
        <button
          th:attr="data-group-id=${group.metadata.name}"
          @click="activeTab = $el.dataset.groupId"
          class="text-base-content/50 inline-flex cursor-pointer items-center gap-1.5 rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
          :class="activeTab === $el.dataset.groupId 
                    ? '!bg-base-100 !text-base-content shadow-sm dark:!bg-base-100/90' 
                    : ''"
        >
          <span th:text="${group.spec.displayName}"></span>
          <span
            class="bg-base-content/10 rounded-md px-1.5 py-0.5 text-xs"
            th:text="${group.status.equipmentCount}"
          ></span>
        </button>
      </th:block>
    </div>
  </div>
</html>
